<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>I Love You Mom</title>
  <style>
    body {
      margin: 0;
      background-color: #ffe6ee; /* нежный пастельный фон */
      overflow: hidden;
      font-family: 'Comic Sans MS', cursive;
    }

    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 600px; /* больше квадрат */
      height: 600px; /* больше квадрат */
      transform: translate(-50%, -50%);
      background: #ffe6ee; /* совпадает с фоном body */
      border: 4px solid white;
      border-radius: 35px;
      box-shadow: inset 0 10px 20px rgba(255, 182, 193, 0.3),
                  inset 0 -10px 20px rgba(255, 182, 193, 0.3),
                  0 8px 20px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
    }

    .text {
      position: relative;
      font-size: 32px;
      color: #e66565;
      text-align: center;
      padding: 0 30px;
      transition: opacity 1s ease;
      z-index: 2;
    }

    .clouds {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 150px;
      background: url('облака-removebg-preview.png') repeat-x bottom center;
      background-size: cover;
      pointer-events: none;
      z-index: 1;
      animation: cloudsMove 20s linear infinite;
    }

    @keyframes cloudsMove {
      from { background-position: 0 bottom; }
      to { background-position: 100% bottom; }
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 600px; /* под размер квадрата */
      height: 600px;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="container" id="loveBox">
    <canvas id="heartCanvas"></canvas>
    <div class="text" id="loveText">I love you Mom</div>
    <div class="clouds"></div>
  </div>

  <script>
    const box = document.getElementById('loveBox');
    const text = document.getElementById('loveText');
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    let toggled = false;

    box.addEventListener('click', () => {
      toggled = !toggled;
      text.style.opacity = 0;
      setTimeout(() => {
        text.textContent = toggled
          ? "Thank you mom for being there for me."
          : "I love you Mom";
        text.style.opacity = 1;
      }, 500);
    });

    canvas.width = box.clientWidth;
    canvas.height = box.clientHeight;

    class Heart {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = Math.random() * 10 + 8;
        this.speed = Math.random() * 1 + 0.5;
        this.opacity = 1;
      }

      update() {
        this.y -= this.speed;
        this.opacity -= 0.005;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.scale(0.6, 0.6);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(0, -this.size / 2, -this.size, -this.size / 2, -this.size, 0);
        ctx.bezierCurveTo(-this.size, this.size, 0, this.size * 1.6, 0, this.size * 2);
        ctx.bezierCurveTo(0, this.size * 1.6, this.size, this.size, this.size, 0);
        ctx.bezierCurveTo(this.size, -this.size / 2, 0, -this.size / 2, 0, 0);
        ctx.closePath();
        ctx.fillStyle = `rgba(255, 160, 122, ${this.opacity})`; // персиковый
        ctx.fill();
        ctx.restore();
      }
    }

    let hearts = [];

    function createHeart() {
      const x = Math.random() * canvas.width;
      const y = canvas.height - 30;
      hearts.push(new Heart(x, y));
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hearts.forEach((heart, i) => {
        heart.update();
        heart.draw();
        if (heart.opacity <= 0) {
          hearts.splice(i, 1);
        }
      });
      requestAnimationFrame(animate);
    }

    setInterval(() => {
      for (let i = 0; i < 2; i++) createHeart();
    }, 100);

    animate();
  </script>
</body>
</html>
